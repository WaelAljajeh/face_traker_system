# ============================================================
# PRODUCTION FACE ATTENDANCE SYSTEM - CONFIGURATION
# ============================================================

# ── Mode toggle ────────────────────────────────────────────
# "speed"   = fast recognition (1-2 frames), lower threshold, 320x320 det
# "accuracy" = high precision (3+ frames), higher threshold, 640x640 det
# Runtime switchable via POST /api/mode (speed|accuracy)
mode: "accuracy"

database:
  type: "sqlite"
  path: "APPDATA/face_attendance.db"

insightface:
  model_name: "buffalo_l"
  providers:
    - "CPUExecutionProvider"
  # BASE values (used as fallback if mode section doesn't override)
  det_size: [640, 640]
  det_threshold: 0.40
  confidence_threshold: 0.55

camera:
  source: 0
  width: 640
  height: 480
  fps: 10
  frame_skip: 2
  exposure: 0
  brightness: 10
  contrast: 10
  reconnect_attempts: 5
  reconnect_delay: 2

quality_filter:
  blur_detection: true
  blur_threshold: 40.0
  pose_filtering: true
  max_yaw: 80
  max_pitch: 60
  max_roll: 60
  brightness_filtering: true
  min_brightness: 5
  max_brightness: 245
  min_face_size: 30
  occlusion_filtering: false
  max_occlusion_ratio: 0.20

tracking:
  max_age: 30
  min_frames: 3
  iou_threshold: 0.5
  high_conf_threshold: 0.9
  embedding_buffer_size: 30
  max_tracks: 100

recognition:
  faiss_index_type: "flat"
  faiss_metric: "cosine"
  similarity_threshold: 0.60
  recognition_threshold: 0.45
  embedding_buffer_per_track: 25
  temporal_confidence_weight: 0.8
  # Number of consecutive same-ID frames required before sending scan
  min_stable_frames: 3

enrollment:
  enabled: true
  unknown_dir: "./unknown_faces"
  min_quality_for_enrollment: 0.55
  enrollment_threshold: 0.55
  merge_threshold: 0.75
  min_samples_for_enrollment: 3
  min_avg_quality_for_enrollment: 0.65
  ignore_expiry_days: 30

attendance:
  cooldown_minutes: 240
  mark_checkout_after_minutes: 480
  duplicate_detection_window: 5
  auto_checkout_enabled: false

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  websocket_enabled: true
  websocket_port: 8001
  max_connections: 100
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "*"
  max_request_size: 52428800
  request_timeout: 30

logging:
  level: "INFO"
  format: "json"
  file: "./logs/attendance.log"
  max_size: 10485760
  backup_count: 5

performance:
  use_gpu: false
  gpu_device: 0
  enable_embedding_cache: true
  cache_size: 1000
  detector_threads: 4
  tracker_threads: 1
  recognition_threads: 4
  db_threads: 2
  batch_detection: false
  batch_size: 4
  max_memory_mb: 1024
  garbage_collection_interval: 60
  inference_every_n_frames: 1
  frame_scale: 1.0

security:
  api_key_required: false
  use_https: false
  rate_limit_enabled: false
  requests_per_minute: 100

monitoring:
  collect_metrics: true
  metrics_interval: 60
  health_check_interval: 30
  enable_alerts: false

maintenance:
  backup_enabled: true
  backup_interval_hours: 24
  backup_dir: "./backups"
  backup_max_count: 7
  vacuum_interval_days: 7
  cleanup_old_records_days: 90

features:
  passive_enrollment: true
  ignore_system: true
  attendance_tracking: true
  unknown_candidate_merging: true
  temporal_averaging: true
  persistence_tracking: true
  overlay_style: modern
  target_face_color: [0, 255, 255]
  matched_face_color: [0, 255, 0]
  unknown_face_color: [0, 165, 255]
  low_quality_color: [0, 0, 255]

  onvif:
    enabled: false
    ip: "192.168.1.188"
    port: 80
    username: "admin"
    password: "123456"
    wsdl_dir: "./wsdl"

  cameras:
    - id: "laptop"
      source: 0
      width: 640
      height: 480
      fps: 10
      frame_skip: 2
      detection_scale: 1.0

# ═══════════════════════════════════════════════════════════
#  MODE PROFILES — override any base values at runtime
# ═══════════════════════════════════════════════════════════
modes:
  speed:
    insightface:
      det_size: [320, 320]
      det_threshold: 0.35
    recognition:
      similarity_threshold: 0.50
      recognition_threshold: 0.40
      min_stable_frames: 1
      temporal_confidence_weight: 0.5
    quality_filter:
      blur_threshold: 15.0
      min_face_size: 20
      max_yaw: 90
      max_pitch: 80
      max_roll: 80
    tracking:
      min_frames: 2
    camera:
      frame_skip: 1

  accuracy:
    insightface:
      det_size: [640, 640]
      det_threshold: 0.40
    recognition:
      similarity_threshold: 0.60
      recognition_threshold: 0.50
      min_stable_frames: 3
      temporal_confidence_weight: 0.8
    quality_filter:
      blur_threshold: 40.0
      min_face_size: 30
      max_yaw: 60
      max_pitch: 45
      max_roll: 45
    tracking:
      min_frames: 3
    camera:
      frame_skip: 2